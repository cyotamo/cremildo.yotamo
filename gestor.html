<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel do Gestor</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1e88e5" />
    <link rel="icon" href="/icon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <link rel="canonical" href="https://yotamonline.web.app/gestor.html" />
    <meta property="og:title" content="Painel do Gestor" />
    <meta property="og:description" content="Painel institucional para visualização dos trabalhos submetidos." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yotamonline.web.app/gestor.html" />
    <meta property="og:image" content="https://yotamonline.web.app/icon.png" />
    <link rel="stylesheet" href="style.css" />
    <style>
      .manager-actions {
        display: flex;
        justify-content: center;
        gap: 0.75rem;
        margin-bottom: 1.2rem;
      }

      .manager-message {
        min-height: 1.25rem;
        margin: 0;
        color: var(--text-secondary);
        font-size: 0.92rem;
      }

      .manager-message.error {
        color: var(--error);
      }

      .manager-message.success {
        color: var(--success);
      }

      .table-shell {
        margin-top: 1rem;
        overflow-x: auto;
      }

      .works-table {
        width: 100%;
        border-collapse: collapse;
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
      }

      .works-table th,
      .works-table td {
        border-bottom: 1px solid var(--border);
        text-align: left;
        padding: 0.75rem 0.85rem;
        font-size: 0.92rem;
      }

      .works-table thead th {
        background-color: var(--brand-secondary);
        color: var(--brand-primary);
        font-weight: 700;
      }

      .works-table tbody tr:last-child td {
        border-bottom: none;
      }

      .works-table a {
        color: var(--brand-primary);
        font-weight: 600;
        text-decoration: none;
      }

      .works-table a:hover {
        text-decoration: underline;
      }

      .feedback-file-input {
        width: 100%;
        max-width: 260px;
        font-size: 0.85rem;
      }

      .feedback-action {
        white-space: nowrap;
      }

      .feedback-send-btn {
        min-width: 92px;
      }
    </style>
  </head>
  <body>
    <main class="page-shell">
      <section class="card" aria-labelledby="manager-title">
        <header class="card-header app-topbar">
          <div class="brand-wrap">
            <img src="/icon.png" alt="Ícone do Portal" class="brand-icon" />
            <div class="brand-text">
              <h1 id="manager-title">Painel do Gestor</h1>
              <p class="subtitle">Visualização institucional dos trabalhos enviados pelos estudantes</p>
            </div>
          </div>
        </header>

        <div class="manager-actions">
          <button id="load-works" class="btn btn-primary" type="button">Trabalhos Enviados</button>
          <button id="logout-manager" class="btn btn-secondary" type="button">Terminar sessão</button>
        </div>

        <p id="manager-message" class="manager-message" role="status" aria-live="polite"></p>
        <section id="works-list" class="table-shell" aria-live="polite"></section>
      </section>
    </main>

    <script type="module" src="gestor.js"></script>
  </body>
</html>
