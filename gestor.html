<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel do Gestor</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1e88e5" />
    <link rel="icon" href="/icon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <link rel="canonical" href="https://yotamonline.web.app/gestor.html" />
    <meta property="og:title" content="Painel do Gestor" />
    <meta property="og:description" content="Painel institucional para visualização dos trabalhos submetidos." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yotamonline.web.app/gestor.html" />
    <meta property="og:image" content="https://yotamonline.web.app/icon.png" />
    <link rel="stylesheet" href="style.css" />
    <style>
      .manager-shell {
        min-height: calc(100vh - 52px);
      }

      .manager-menu .app-topbar {
        margin-bottom: 0.85rem;
      }

      .manager-menu-title {
        margin: 0;
        color: var(--brand-primary);
        font-size: 0.84rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .manager-submenu {
        padding-left: 0;
      }

      .manager-content {
        display: grid;
        align-content: start;
        gap: 0.45rem;
        padding-top: clamp(0.85rem, 1.3vw, 1.1rem);
      }

      .manager-content-heading {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }

      .manager-content-heading h1 {
        color: var(--text-primary);
        font-size: clamp(1.15rem, 2vw, 1.45rem);
      }

      .manager-message {
        min-height: 1.25rem;
        margin: 0;
        color: var(--text-secondary);
        font-size: 0.92rem;
      }

      .manager-message:empty {
        display: none;
      }

      .manager-message.error {
        color: var(--error);
      }

      .manager-message.success {
        color: var(--success);
      }

      .table-shell {
        margin-top: 0.2rem;
        overflow-x: auto;
      }

      .works-table {
        width: 100%;
        border-collapse: collapse;
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
      }

      .works-table th,
      .works-table td {
        border-bottom: 1px solid var(--border);
        text-align: left;
        padding: 0.75rem 0.85rem;
        font-size: 0.92rem;
      }

      .works-table thead th {
        background-color: var(--brand-secondary);
        color: var(--brand-primary);
        font-weight: 700;
      }

      .works-table tbody tr:nth-child(even) {
        background-color: #fafcff;
      }

      .works-table tbody tr:hover {
        background-color: #f2f7ff;
      }

      .works-table tbody tr:last-child td {
        border-bottom: none;
      }

      .works-table a {
        color: var(--brand-primary);
        font-weight: 600;
        text-decoration: none;
      }

      .works-table a:hover {
        text-decoration: underline;
      }

      .manager-works-table th:nth-child(4),
      .manager-works-table td:nth-child(4) {
        min-width: 190px;
      }

      .manager-works-table th:nth-child(5),
      .manager-works-table td:nth-child(5) {
        width: 120px;
      }

      .corrected-file-input {
        min-width: 170px;
      }

      .send-corrected-btn {
        width: 100%;
        text-align: center;
      }

      .send-corrected-btn:disabled {
        cursor: wait;
        opacity: 0.72;
        transform: none;
        box-shadow: none;
      }

      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }


      @media (max-width: 680px) {
        .manager-shell {
          min-height: auto;
        }

        .manager-content {
          padding-top: 1rem;
        }

        .manager-content-heading {
          align-items: flex-start;
          flex-direction: column;
          gap: 0.35rem;
        }

        .table-shell {
          margin-top: 0.4rem;
          overflow-x: visible;
        }

        .works-table,
        .works-table thead,
        .works-table tbody,
        .works-table tr,
        .works-table th,
        .works-table td {
          display: block;
        }

        .works-table {
          border: 0;
          border-radius: 0;
        }

        .works-table thead {
          position: absolute;
          width: 1px;
          height: 1px;
          padding: 0;
          margin: -1px;
          overflow: hidden;
          clip: rect(0, 0, 0, 0);
          white-space: nowrap;
          border: 0;
        }

        .works-table tbody tr {
          margin-bottom: 0.85rem;
          overflow: hidden;
          border: 1px solid var(--border);
          border-radius: 14px;
          background: #ffffff;
          box-shadow: 0 8px 18px rgba(22, 40, 72, 0.08);
        }

        .works-table tbody tr:nth-child(even),
        .works-table tbody tr:hover {
          background: #ffffff;
        }

        .works-table td {
          display: grid;
          grid-template-columns: minmax(7.5rem, 38%) 1fr;
          align-items: center;
          gap: 0.75rem;
          width: 100%;
          padding: 0.75rem;
          border-bottom: 1px solid var(--border);
          word-break: break-word;
        }

        .works-table td::before {
          content: attr(data-label);
          color: var(--text-secondary);
          font-size: 0.78rem;
          font-weight: 700;
          letter-spacing: 0.04em;
          text-transform: uppercase;
        }

        .works-table tbody tr:last-child td,
        .works-table tbody tr td:last-child {
          border-bottom: none;
        }

        .corrected-file-input {
          min-width: 0;
          width: 100%;
        }
      }

      @media (max-width: 420px) {
        .works-table td {
          grid-template-columns: 1fr;
          gap: 0.35rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="header-topo">
      <button id="logout-manager" class="btn btn-top-login" type="button">Terminar sessão</button>
    </div>

    <main class="page-shell layout-portal manager-shell">
      <aside class="menu-lateral manager-menu" aria-label="Menu do gestor">
        <header class="app-topbar" aria-label="Painel do gestor">
          <p class="manager-menu-title">Painel do Gestor</p>
        </header>

        <nav class="menu-nav">
          <button
            id="orientandos-toggle"
            class="btn btn-primary menu-group-btn"
            type="button"
            aria-expanded="false"
            aria-controls="orientandos-submenu"
          >
            Orientandos
          </button>
          <div id="orientandos-submenu" class="submenu-container manager-submenu">
            <button id="load-works" class="submenu-btn" type="button">Trabalhos Enviados</button>
          </div>
        </nav>
      </aside>

      <section class="area-conteudo manager-content" aria-labelledby="manager-title">
        <div id="manager-heading" class="manager-content-heading hidden">
          <h1 id="manager-title">Trabalhos Enviados</h1>
        </div>
        <p id="manager-message" class="manager-message" role="status" aria-live="polite"></p>
        <section id="works-list" class="table-shell" aria-live="polite"></section>
      </section>
    </main>

    <script type="module" src="gestor.js"></script>
  </body>
</html>
